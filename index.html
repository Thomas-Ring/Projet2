<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Cinémathèque </title>
</head>
<body>
    <header> 
        Cinémathèque
        <img src="assets/assets/nav.png">
        <nav> 
            <a> Ajouter </a>
            <a> Sélection </a>
            <a> Liste </a>
            <a> Statistiques </a>
        </nav>
    </header>

    <form name = "Ajouter" method = "post">
        <fieldset><legend>Ajouter un film ou une série</legend>
        Titre: <input type = "text" name = "titre" placeholder = "Ex: Legally Blonde" required>

        Genre : 
            <input type = "text" name = "genre" id = "genre" list = "genres" placeholder="Choisir un genre" required>
            <datalist id="genres">
                    <option value = "action" label= "Action">  </option>
                    <option value = "fantasy" label= "Fantaisie"> </option>
                    <option value = "romance" label= "Romance"> </option>
                    <option value = "scifi" label= "Science-fiction"> </option>
                    <option value = "comedy" label="Comédie"> </option>
                    <option value = "drama" label="Drame"> </option>
                    <option value = "animation" label="Animation"> </option>
                    <option value = "documentary" label="Documentaire"> </option>
                    <option value = "series" label= "Série"> </option>
            </datalist>
    
        Statut: <input type = "text" name = "statut" id="statut" list="statuts" placeholder="Choisir un statut" required>
            <datalist id="statuts">
                    <option value = "à voir" label="À voir"> </option>
                    <option value = "en cours" label="En cours"> </option>
                    <option value = "vu" label="Vu"> </option>
            </datalist>
        Ajouter: <button type = "submit" name = "ajouter">
        <label for="submit">+ Ajouter</label>
        </fieldset>
    </form>

    <table>
        <tr>
            <th> Titre </th>
            <th> Genre </th>
            <th> Statut </th>
            <th> Action </th>
        </tr>
        <tr>
            <td> Inception </td>
            <td> Science-fiction </td>
            <td> Vu </td>
            <td> </td>
        </tr>
        <tr>
            <td> Stranger Things </td>
            <td> Série </td>
            <td> En cours </td>
            <td> </td>
        </tr>
        <tr>
            <td> Toy Story </td>
            <td> Animation </td>
            <td> À voir </td>
            <td> </td>
        </tr>
    </table>

    <footer>
        &copy 2026 IFT1005
        <a href = "https://en.wikipedia.org/wiki/Privacy" > Privacy </a>
        <a href = "https://en.wikipedia.org/wiki/Contact_lens"> Contact </a>
    </footer>
    
</body>
</html>
