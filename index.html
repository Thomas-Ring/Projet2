<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Cinémathèque </title>
</head>
<body>
    <header> 
        Cinémathèque
        <img src="assets/assets/nav.png">
        <nav> 
            <a> Ajouter </a>
            <a> Sélection </a>
            <a> Liste </a>
            <a> Statistiques </a>
        </nav>
    </header>

    <form name = "Ajouter" method = "post">
        Titre: <input type = "text" name = "titre" placeholder = "Ex: Legally Blonde" required>
        Genre : <select size = "4" name = "genre" required>
                    <option value = "action"> Action </option>
                    <option value = "fantasy"> Fantastique </option>
                    <option value = "romance"> Romance </option>
                    <option value = "scifi"> Science-fiction </option>
                </select>
        Statut: <select size = "3" name = "statut" required>
                    <option value = "à voir"> À voir </option>
                    <option value = "en cours"> En cours </option>
                    <option value = "vu"> Vu </option>
                </select>
        Ajouter <input type = "submit" name = "ajouter" >
    </form>

    <footer>
        &copy IFT1005
        <a href = "https://en.wikipedia.org/wiki/Privacy" > Privacy </a>
        <a href = "https://en.wikipedia.org/wiki/Contact_lens"> Contact </a>
    </footer>
    
</body>
</html>
